<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Application de gestion pour banque alimentaire">
  <meta name="theme-color" content="#2E5CFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Banque Alim">
  
  <title>Banque Alimentaire - Fontenay</title>
  
  <link rel="manifest" href="manifest.json">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
        sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }
    
    #root {
      min-height: 100vh;
    }

    /* Amélioration des inputs sur mobile */
    input, select, textarea, button {
      font-size: 16px; /* Évite le zoom automatique sur iOS */
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const normalizeString = (str) => {
      return str
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')  // Enlève les accents
        .trim()
        .replace(/s$/, '');               // Enlève le "s" final (pluriel)
    };

    const areNamesEquivalent = (name1, name2) => {
      return normalizeString(name1) === normalizeString(name2);
    };

    // ========== HELPER API ==========
    const API_URL = 'https://banque-alimentaire-backend.onrender.com/api';

    const apiCall = async (endpoint, options = {}) => {
      const token = localStorage.getItem('ba_token');
      const defaultOptions = {
        headers: {
          'Content-Type': 'application/json',
          ...(token && { 'Authorization': `Bearer ${token}` }),
        },
      };
      const response = await fetch(`${API_URL}${endpoint}`, {
        ...defaultOptions,
        ...options,
        headers: { ...defaultOptions.headers, ...options.headers },
      });
      if (response.status === 401) {
        localStorage.removeItem('ba_token');
        localStorage.removeItem('ba_logged_in');
        window.location.reload();
      }
      return response;
    };

    // ========== COMPOSANT CORBEILLE ==========
    function TrashComponent() {
      const [trashedItems, setTrashedItems] = React.useState([]);
      const [loading, setLoading] = React.useState(true);
      const [category, setCategory] = React.useState('inventory');

      React.useEffect(() => {
        loadTrashed();
      }, [category]);

      const loadTrashed = async () => {
        setLoading(true);
        try {
          // Utilise ?type= comme le backend l'attend
          const response = await apiCall(`/trash?type=${category}`);
          if (response.ok) {
            const data = await response.json();
            setTrashedItems(data);
          }
        } catch (err) {
          console.error('Erreur:', err);
        } finally {
          setLoading(false);
        }
      };

      const restore = async (id) => {
        if (!confirm('Restaurer cet élément ?')) return;
        
        try {
          // URL: /trash/:type/:id/restore
          const response = await apiCall(`/trash/${category}/${id}/restore`, {
            method: 'POST'
          });

          if (response.ok) {
            alert('✅ Élément restauré !');
            await loadTrashed();
          } else {
            alert('❌ Erreur restauration');
          }
        } catch (err) {
          alert('❌ Erreur connexion');
        }
      };

      const deleteForever = async (id) => {
        if (!confirm('⚠️ SUPPRIMER DÉFINITIVEMENT ? Cette action est irréversible !')) return;
        
        try {
          // URL: /trash/:type/:id
          const response = await apiCall(`/trash/${category}/${id}`, {
            method: 'DELETE'
          });

          if (response.ok) {
            alert('✅ Élément supprimé définitivement');
            await loadTrashed();
          } else {
            alert('❌ Erreur suppression');
          }
        } catch (err) {
          alert('❌ Erreur connexion');
        }
      };

      return (
        <div>
          {/* Sélecteur de catégorie */}
          <div style={{ marginBottom: '20px', display: 'flex', gap: '10px', flexWrap: 'wrap' }}>
            {[
              { key: 'inventory', label: '📦 Inventaire' },
              { key: 'templates', label: '📋 Cartons' },
              { key: 'distributions', label: '🎁 Distributions' },
              { key: 'invoices', label: '📄 Factures' }
            ].map(cat => (
              <button
                key={cat.key}
                onClick={() => setCategory(cat.key)}
                style={{
                  padding: '10px 20px',
                  background: category === cat.key ? '#2E5CFF' : '#F3F4F6',
                  color: category === cat.key ? 'white' : '#374151',
                  border: 'none',
                  borderRadius: '8px',
                  cursor: 'pointer',
                  fontWeight: category === cat.key ? '600' : '400'
                }}
              >
                {cat.label}
              </button>
            ))}
          </div>

          {/* Liste des éléments */}
          {loading ? (
            <div style={{ textAlign: 'center', padding: '40px', color: '#6B7280' }}>
              Chargement...
            </div>
          ) : trashedItems.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '40px', color: '#6B7280' }}>
              🗑️ Corbeille vide pour cette catégorie
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
              {trashedItems.map(item => (
                <div
                  key={item.id}
                  style={{
                    padding: '15px',
                    background: '#FEF2F2',
                    border: '1px solid #FCA5A5',
                    borderRadius: '8px',
                    display: 'flex',
                    justifyContent: 'space-between',
                    alignItems: 'center',
                    flexWrap: 'wrap',
                    gap: '10px'
                  }}
                >
                  <div>
                    <div style={{ fontWeight: '600', marginBottom: '5px' }}>
                      {item.item_name || item.template_name || item.supplier || 'Sans nom'}
                    </div>
                    <div style={{ fontSize: '0.85rem', color: '#6B7280' }}>
                      Supprimé le {new Date(item.deleted_at).toLocaleDateString('fr-FR')}
                    </div>
                  </div>

                  <div style={{ display: 'flex', gap: '10px' }}>
                    <button
                      onClick={() => restore(item.id)}
                      style={{
                        padding: '8px 16px',
                        background: '#4ADE80',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        cursor: 'pointer',
                        fontWeight: '500'
                      }}
                    >
                      ♻️ Restaurer
                    </button>
                    <button
                      onClick={() => deleteForever(item.id)}
                      style={{
                        padding: '8px 16px',
                        background: '#DC2626',
                        color: 'white',
                        border: 'none',
                        borderRadius: '6px',
                        cursor: 'pointer',
                        fontWeight: '500'
                      }}
                    >
                      🗑️ Supprimer
                    </button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function BanqueAlimentaireApp({ onLogout }) {
      // ========== RÔLE ET UTILISATEUR ==========
      const userRole = localStorage.getItem('ba_role') || 'user';
      const isAdmin = userRole === 'admin';
      const userName = localStorage.getItem('ba_user_name') || 'Utilisateur';

      // ========== INVENTAIRE (connecté à l'API) ==========
      const [inventory, setInventory] = useState([]);
      const [inventoryLoading, setInventoryLoading] = useState(true);
      const [inventorySaving, setInventorySaving] = useState(false);
      
      // ========== VUE DÉTAIL ARTICLE ==========
      const [selectedArticle, setSelectedArticle] = useState(null);
      const [editingArticleName, setEditingArticleName] = useState(false);
      const [newArticleName, setNewArticleName] = useState('');
      
      // ========== CARTONS (connecté à l'API) ==========
      const [boxTemplates, setBoxTemplates] = useState([]);
      const [templatesLoading, setTemplatesLoading] = useState(true);
      
      // ========== DISTRIBUTIONS (connecté à l'API) ==========
      const [distributions, setDistributions] = useState([]);
      const [distributionsLoading, setDistributionsLoading] = useState(true);
      
      const [activeTab, setActiveTab] = useState('inventory');
      const [newItem, setNewItem] = useState({ item_name: '', quantity: '', unit: 'unités', price: '' });
      const [editingItem, setEditingItem] = useState(null);
      
      const [newTemplate, setNewTemplate] = useState({ template_name: '', description: '', items: [] });
      const [newTemplateItem, setNewTemplateItem] = useState({ item_name: '', quantity: 0 });
      
      const [newDistribution, setNewDistribution] = useState({ 
        template_id: '', 
        distribution_date: '', 
        box_count: 0,
        notes: '' 
      });
      
      const [selectedDistribution, setSelectedDistribution] = useState(null);
      const [distributionNeeds, setDistributionNeeds] = useState([]);
      
      const [menuOpen, setMenuOpen] = useState(false);
      
      // ========== FACTURES (connecté à l'API) ==========
      const [invoices, setInvoices] = useState([]);
      const [invoicesLoading, setInvoicesLoading] = useState(true);
      
      const [showInvoices, setShowInvoices] = useState(false);
      const [expandedInvoice, setExpandedInvoice] = useState(null);
      const [editingInvoice, setEditingInvoice] = useState(null);
      
      const [newInvoice, setNewInvoice] = useState({
        supplier: '',
        invoice_number: '',
        invoice_date: '',
        file: null,
        fileData: null,
        items: [],
        total: 0,
        totalTTC: 0,
        tva: 5.5,
        useTva: true,
        notes: ''
      });
      
      const [newInvoiceItem, setNewInvoiceItem] = useState({
        item_name: '',
        quantity: '',
        unit: 'unités',
        price: ''
      });

      // ========== CHARGER L'INVENTAIRE DEPUIS L'API ==========
      const loadInventory = async () => {
        try {
          setInventoryLoading(true);
          const response = await apiCall('/inventory');
          if (response.ok) {
            const data = await response.json();
            // Adapter les données de l'API au format frontend
            // Adapter les données de l'API au format frontend
            const formatted = data.map(item => ({
              id: item.id,
              item_name: item.item_name,
              quantity: parseFloat(item.quantity),
              unit: item.unit || 'unités',
              price: parseFloat(item.price) || 0
            }));
            setInventory(formatted);
          }
        } catch (err) {
          console.error('Erreur chargement inventaire:', err);
        } finally {
          setInventoryLoading(false);
        }
      };

      // ========== CHARGER LES CARTONS DEPUIS L'API ==========
      const loadTemplates = async () => {
        try {
          setTemplatesLoading(true);
          const response = await apiCall('/templates');
          if (response.ok) {
            const data = await response.json();
            // Adapter les données pour le frontend
            const formatted = data.map(t => ({
              id: t.id,
              template_name: t.template_name,
              description: t.description || '',
              items: t.items || []
            }));
            setBoxTemplates(formatted);
          }
        } catch (err) {
          console.error('Erreur chargement templates:', err);
        } finally {
          setTemplatesLoading(false);
        }
      };

      // ========== CHARGER LES DISTRIBUTIONS DEPUIS L'API ==========
      const loadDistributions = async () => {
        try {
          setDistributionsLoading(true);
          const response = await apiCall('/distributions');
          if (response.ok) {
            const data = await response.json();
            setDistributions(data);
          }
        } catch (err) {
          console.error('Erreur chargement distributions:', err);
        } finally {
          setDistributionsLoading(false);
        }
      };

      // ========== CHARGER LES FACTURES DEPUIS L'API ==========
      const loadInvoices = async () => {
        try {
          setInvoicesLoading(true);
          const response = await apiCall('/invoices');
          if (response.ok) {
            const data = await response.json();
            // Convertir total en nombre pour éviter les erreurs
            const formatted = data.map(inv => ({
              ...inv,
              total: parseFloat(inv.total) || 0
            }));
            setInvoices(formatted);
          }
        } catch (err) {
          console.error('Erreur chargement factures:', err);
        } finally {
          setInvoicesLoading(false);
        }
      };

      // ========== CHARGER TOUTES LES DONNÉES AU DÉMARRAGE ==========
      useEffect(() => {
        loadInventory();
        loadTemplates();
        loadDistributions();
        loadInvoices();
      }, []);

      // ========== REGROUPER LES ARTICLES PAR NOM NORMALISÉ ==========
      const getGroupedInventory = () => {
        const groups = {};
        
        inventory.forEach(item => {
          const normalizedName = normalizeString(item.item_name);
          const displayName = item.item_name.charAt(0).toUpperCase() + item.item_name.slice(1).toLowerCase();
          
          if (!groups[normalizedName]) {
            groups[normalizedName] = {
              displayName: displayName,
              totalQuantity: 0,
              unit: item.unit,
              lots: [],
              totalValue: 0
            };
          }
          
          groups[normalizedName].totalQuantity += item.quantity;
          groups[normalizedName].totalValue += item.quantity * (item.price || 0);
          groups[normalizedName].lots.push({
            id: item.id,
            item_name: item.item_name,
            quantity: item.quantity,
            price: item.price || 0,
            unit: item.unit
          });
        });
        
        // Calculer le prix moyen pour chaque groupe
        Object.keys(groups).forEach(key => {
          const group = groups[key];
          group.averagePrice = group.totalQuantity > 0 
            ? group.totalValue / group.totalQuantity 
            : 0;
        });
        
        return Object.values(groups).sort((a, b) => 
          a.displayName.localeCompare(b.displayName)
        );
      };

      // ========== DISTRIBUER (retirer du stock) ==========
      const executeDistribution = async (distributionId) => {
        const dist = distributions.find(d => d.id === distributionId);
        if (!dist) {
          alert('❌ Distribution non trouvée');
          return;
        }

        const template = boxTemplates.find(t => t.id === parseInt(dist.template_id));
        if (!template) {
          alert('❌ Modèle de carton non trouvé');
          return;
        }

        // Vérifier le stock disponible
        const insufficientItems = [];
        template.items.forEach(templateItem => {
          const totalNeeded = templateItem.quantity * dist.box_count;
          const inventoryItem = inventory.find(invItem =>
            areNamesEquivalent(invItem.item_name, templateItem.item_name)
          );
          const available = inventoryItem ? inventoryItem.quantity : 0;
          
          if (available < totalNeeded) {
            insufficientItems.push({
              name: templateItem.item_name,
              needed: totalNeeded,
              available: available,
              missing: totalNeeded - available
            });
          }
        });

        if (insufficientItems.length > 0) {
          const message = insufficientItems.map(item => 
            `• ${item.name}: besoin ${item.needed}, disponible ${item.available} (manque ${item.missing})`
          ).join('\n');
          alert(`❌ Stock insuffisant :\n\n${message}`);
          return;
        }

        if (!confirm(`Distribuer ${dist.box_count} cartons "${template.template_name}" ?\n\nCette action retirera les denrées du stock.`)) {
          return;
        }

        setInventorySaving(true);
        try {
          // Retirer chaque article du stock
          for (const templateItem of template.items) {
            const totalToRemove = templateItem.quantity * dist.box_count;
            
            // Trouver tous les lots correspondants et retirer en commençant par les plus anciens
            const matchingLots = inventory
              .filter(invItem => areNamesEquivalent(invItem.item_name, templateItem.item_name))
              .sort((a, b) => a.id - b.id); // Plus ancien d'abord
            
            let remainingToRemove = totalToRemove;
            
            for (const lot of matchingLots) {
              if (remainingToRemove <= 0) break;
              
              const removeFromThisLot = Math.min(lot.quantity, remainingToRemove);
              const newQuantity = lot.quantity - removeFromThisLot;
              
              if (newQuantity <= 0) {
                // Supprimer le lot entièrement
                await apiCall(`/inventory/${lot.id}`, { method: 'DELETE' });
              } else {
                // Mettre à jour la quantité
                await apiCall(`/inventory/${lot.id}`, {
                  method: 'PUT',
                  body: JSON.stringify({
                    item_name: lot.item_name,
                    quantity: newQuantity,
                    unit: lot.unit,
                    price: lot.price
                  }),
                });
              }
              
              remainingToRemove -= removeFromThisLot;
            }
          }

          // Marquer la distribution comme effectuée
          await apiCall(`/distributions/${dist.id}`, {
            method: 'PUT',
            body: JSON.stringify({
              ...dist,
              status: 'completed'
            }),
          });

          await loadInventory();
          await loadDistributions();
          alert(`✅ Distribution effectuée ! ${dist.box_count} cartons distribués.`);
          
        } catch (err) {
          console.error('Erreur distribution:', err);
          alert('❌ Erreur lors de la distribution');
        } finally {
          setInventorySaving(false);
        }
      };
      const addToInventory = async () => {
        const qty = parseFloat(newItem.quantity) || 0;
        const prc = parseFloat(newItem.price) || 0;
        
        if (!newItem.item_name || qty <= 0) {
          alert('Veuillez remplir le nom et la quantité');
          return;
        }

        setInventorySaving(true);
        try {
          // Vérifier si l'article existe déjà
          const existingItem = inventory.find(item => 
            areNamesEquivalent(item.item_name, newItem.item_name)
          );

          if (existingItem) {
            // Mettre à jour l'article existant
            const newQuantity = existingItem.quantity + qty;
            const response = await apiCall(`/inventory/${existingItem.id}`, {
              method: 'PUT',
              body: JSON.stringify({
                item_name: existingItem.item_name,
                quantity: newQuantity,
                unit: existingItem.unit,
                price: prc > 0 ? prc : existingItem.price
              }),
            });

            if (response.ok) {
              await loadInventory();
              setNewItem({ item_name: '', quantity: '', unit: 'unités', price: '' });
              alert(`✅ Quantité mise à jour : ${existingItem.item_name} = ${newQuantity} ${existingItem.unit}`);
            } else {
              const error = await response.json();
              alert('❌ ' + (error.error || 'Erreur de mise à jour'));
            }
          } else {
            // Créer un nouvel article
            const response = await apiCall('/inventory', {
              method: 'POST',
              body: JSON.stringify({
                item_name: newItem.item_name,
                quantity: qty,
                unit: newItem.unit,
                price: prc
              }),
            });

            if (response.ok) {
              await loadInventory();
              setNewItem({ item_name: '', quantity: '', unit: 'unités', price: '' });
              alert('✅ Article ajouté !');
            } else {
              const error = await response.json();
              alert('❌ ' + (error.error || 'Erreur d\'ajout'));
            }
          }
        } catch (err) {
          console.error('Erreur:', err);
          alert('❌ Erreur de connexion au serveur');
        } finally {
          setInventorySaving(false);
        }
      };

      const updateInventoryItem = async (id, quantity) => {
        const item = inventory.find(i => i.id === id);
        if (!item) return;

        setInventorySaving(true);
        try {
          const response = await apiCall(`/inventory/${id}`, {
            method: 'PUT',
            body: JSON.stringify({
              item_name: item.item_name,
              quantity: parseFloat(quantity),
              unit: item.unit,
              price: item.price
            }),
          });

          if (response.ok) {
            await loadInventory();
            setEditingItem(null);
          } else {
            const error = await response.json();
            alert('❌ ' + (error.error || 'Erreur de mise à jour'));
          }
        } catch (err) {
          console.error('Erreur:', err);
          alert('❌ Erreur de connexion');
        } finally {
          setInventorySaving(false);
        }
      };

      const deleteInventoryItem = async (id) => {
        if (!confirm('Supprimer cet article ?')) return;

        setInventorySaving(true);
        try {
          const response = await apiCall(`/inventory/${id}`, {
            method: 'DELETE',
          });

          if (response.ok) {
            await loadInventory();
          } else {
            const error = await response.json();
            alert('❌ ' + (error.error || 'Erreur de suppression'));
          }
        } catch (err) {
          console.error('Erreur:', err);
          alert('❌ Erreur de connexion');
        } finally {
          setInventorySaving(false);
        }
      };

      // ========== RENOMMER UN ARTICLE (tous les lots) ==========
      const renameArticle = async () => {
        if (!newArticleName.trim()) {
          alert('Veuillez entrer un nom');
          return;
        }

        if (!selectedArticle || !selectedArticle.lots) {
          return;
        }

        setInventorySaving(true);
        try {
          // Renommer tous les lots de cet article
          for (const lot of selectedArticle.lots) {
            await apiCall(`/inventory/${lot.id}`, {
              method: 'PUT',
              body: JSON.stringify({
                item_name: newArticleName.trim(),
                quantity: lot.quantity,
                unit: lot.unit,
                price: lot.price
              }),
            });
          }

          await loadInventory();
          setEditingArticleName(false);
          setNewArticleName('');
          setSelectedArticle(null);
          alert('✅ Article renommé !');
        } catch (err) {
          console.error('Erreur:', err);
          alert('❌ Erreur lors du renommage');
        } finally {
          setInventorySaving(false);
        }
      };

      const addToNewTemplate = () => {
        if (newTemplateItem.item_name && newTemplateItem.quantity > 0) {
          const existingIndex = newTemplate.items.findIndex(item =>
            areNamesEquivalent(item.item_name, newTemplateItem.item_name)
          );

          if (existingIndex !== -1) {
            const updatedItems = [...newTemplate.items];
            updatedItems[existingIndex].quantity += parseFloat(newTemplateItem.quantity);
            setNewTemplate({ ...newTemplate, items: updatedItems });
            alert(`✅ Quantité mise à jour`);
          } else {
            setNewTemplate({
              ...newTemplate,
              items: [...newTemplate.items, { ...newTemplateItem }]
            });
          }
          
          setNewTemplateItem({ item_name: '', quantity: 0 });
        }
      };

      const removeFromNewTemplate = (index) => {
        setNewTemplate({
          ...newTemplate,
          items: newTemplate.items.filter((_, i) => i !== index)
        });
      };

      const saveBoxTemplate = async () => {
        if (!newTemplate.template_name || newTemplate.items.length === 0) {
          alert('Nom et articles requis');
          return;
        }

        try {
          const response = await apiCall('/templates', {
            method: 'POST',
            body: JSON.stringify({
              template_name: newTemplate.template_name,
              description: newTemplate.description || '',
              items: newTemplate.items
            }),
          });

          if (response.ok) {
            await loadTemplates();
            setNewTemplate({ template_name: '', description: '', items: [] });
            alert('✅ Modèle créé !');
          } else {
            const error = await response.json();
            alert('❌ ' + (error.error || 'Erreur création'));
          }
        } catch (err) {
          console.error('Erreur:', err);
          alert('❌ Erreur connexion');
        }
      };

      const deleteBoxTemplate = async (id) => {
        if (!confirm('Supprimer ce modèle ?')) return;

        try {
          const response = await apiCall(`/templates/${id}`, {
            method: 'DELETE',
          });

        }

        const dist = distributions.find(d => d.id === distributionId);
        const template = boxTemplates.find(t => t.id === parseInt(dist.template_id));
        
        if (!template) {
          alert('Modèle de carton introuvable');
          return;
        }
        
        const needs = template.items.map(templateItem => {
          const inventoryItem = inventory.find(invItem =>
            areNamesEquivalent(invItem.item_name, templateItem.item_name)
          );
          
          const total_needed = templateItem.quantity * dist.box_count;
          const available = inventoryItem ? inventoryItem.quantity : 0;
          const missing = Math.max(0, total_needed - available);
          const price = inventoryItem ? inventoryItem.price || 0 : 0;
          const missingCost = missing * price;
          
          return {
            item_name: templateItem.item_name,
            quantity_per_box: templateItem.quantity,
            total_needed,
            available,
            missing,
            sufficient: missing === 0,
            price,
            missingCost
          };
        });
        
        setDistributionNeeds(needs);
        setSelectedDistribution(distributionId);
      };

                                            cursor: invoice.added_to_stock ? 'not-allowed' : 'pointer'
                                          }}
                                        >
                                          {invoice.added_to_stock ? '✅ Ajouté' : '📦 → Stock'}
                                        </button>
                                      )}
                                      
                                      <button
                                        onClick={(e) => {
                                          e.stopPropagation();
                                          deleteInvoice(invoice.id);
                                        }}
                                        style={{
                                          padding: '12px 16px',
                                          background: '#fed7d7',
                                          border: 'none',
                                          borderRadius: '8px',
                                          cursor: 'pointer',
                                          fontWeight: '600'
                                        }}
                                      >
                                        🗑️
                                      </button>
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                    </div>

                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }


    function LoginPage({ onSuccess }) {
      const [pin, setPin] = React.useState('');
      const [loading, setLoading] = React.useState(false);
      const [error, setError] = React.useState('');

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          const response = await fetch(API_URL + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            localStorage.setItem('ba_token', data.token);
            localStorage.setItem('ba_logged_in', 'true');
            localStorage.setItem('ba_role', data.role || 'user');
            localStorage.setItem('ba_user_name', data.name || 'Utilisateur');
            onSuccess();
          } else {
            setError(data.error || 'PIN incorrect');
          }
        } catch (err) {
          setError('Erreur de connexion au serveur');
        } finally {
          setLoading(false);
        }
      };

      return React.createElement('div', {
        style: {
          minHeight: '100vh',
          background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
          display: 'flex',
          alignItems: 'center',
          justifyContent: 'center',
          padding: '20px',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
        }
      },
        React.createElement('div', {
          style: {
            background: 'white',
            padding: '40px',
            borderRadius: '20px',
            boxShadow: '0 20px 60px rgba(0,0,0,0.3)',
            maxWidth: '400px',
            width: '100%'
          }
        },
          // Header
          React.createElement('div', { style: { textAlign: 'center', marginBottom: '30px' } },
            React.createElement('h1', {
              style: { color: '#2E5CFF', fontSize: '28px', marginBottom: '10px', fontWeight: '600' }
            }, '🍎 Banque Alimentaire'),
            React.createElement('p', { style: { color: '#666', fontSize: '14px' } }, 'Fontenay-sous-Bois')
          ),

          // Erreur
          error && React.createElement('div', {
            style: {
              background: '#fee',
              color: '#c33',
              padding: '12px',
              borderRadius: '8px',
              marginBottom: '20px',
              fontSize: '14px',
              textAlign: 'center'
            }
          }, error),

          // Formulaire
          React.createElement('form', { onSubmit: handleSubmit },
            React.createElement('div', { style: { marginBottom: '20px' } },
              React.createElement('label', {
                style: {
                  display: 'block',
                  marginBottom: '8px',
                  color: '#333',
                  fontWeight: '500'
                }
              }, 'Code PIN'),
              React.createElement('input', {
                type: 'password',
                value: pin,
                onChange: (e) => setPin(e.target.value),
                placeholder: 'Entrez votre code PIN',
                maxLength: 10,
                autoFocus: true,
                disabled: loading,
                style: {
                  width: '100%',
                  padding: '12px',
                  border: '2px solid #e0e0e0',
                  borderRadius: '8px',
                  fontSize: '16px',
                  outline: 'none',
                  transition: 'border-color 0.3s'
                }
              })
            ),

            React.createElement('button', {
              type: 'submit',
              disabled: loading || !pin,
              style: {
                width: '100%',
                padding: '14px',
                background: loading || !pin ? '#ccc' : 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)',
                color: 'white',
                border: 'none',
                borderRadius: '8px',
                fontSize: '16px',
                fontWeight: '600',
                cursor: loading || !pin ? 'not-allowed' : 'pointer',
                transition: 'transform 0.2s'
              }
            }, loading ? 'Connexion...' : 'Se connecter')
          ),

          // Info PIN
          React.createElement('div', {
            style: {
              marginTop: '20px',
              textAlign: 'center',
              fontSize: '12px',
              color: '#999'
            }
          }, 'PIN par défaut : 1234')
        )
      );
    }

    // ========== APP AVEC AUTH ==========
    function AppWithAuth() {
      const [isAuth, setIsAuth] = React.useState(false);
      const [checking, setChecking] = React.useState(true);

      React.useEffect(() => {
        const token = localStorage.getItem('ba_token');
        const logged = localStorage.getItem('ba_logged_in');
        if (token && logged === 'true') {
          setIsAuth(true);
        }
        setChecking(false);
      }, []);

      if (checking) {
        return React.createElement('div', {
          style: { textAlign: 'center', padding: '50px', fontFamily: 'sans-serif' }
        }, 'Chargement...');
      }

      if (!isAuth) {
        return React.createElement(LoginPage, { onSuccess: () => setIsAuth(true) });
      }

      return React.createElement(BanqueAlimentaireApp, { 
        onLogout: () => {
          localStorage.removeItem('ba_token');
          localStorage.removeItem('ba_logged_in');
          localStorage.removeItem('ba_role');
          localStorage.removeItem('ba_user_name');
          setIsAuth(false);
        }
      });
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(AppWithAuth));
  </script>
</body>
</html>
